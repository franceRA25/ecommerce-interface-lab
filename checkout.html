<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<form id="checkout-form">

<section>
    <h2>Shipping/Checkout</h2>

    <fieldset>
        <label>Shipping Address</label><br><br>

        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label>Street:</label><br>
        <input type="text" id="street" required><br><br>

        <label>Zip Code:</label><br>
        <input type="text" id="zip" required>
    </fieldset>
</section>

<section>
    <h2>Payment Method</h2>

    <input type="radio" name="payment" value="card"> Credit Card<br>
    <input type="radio" name="payment" value="paypal"> PayPal<br><br>

    <button type="submit">Place Order</button>
</section>

</form>

<aside>
    <h3>Order Summary</h3>
    <p>Items: ₱17,315.00</p>
    <p>Shipping: ₱100</p>
    <p>Total: ₱17,415.00</p>
</aside>

<script src="solution.js"></script>
</body>
</html>
